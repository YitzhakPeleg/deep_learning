[project]
name = "beyond-backprop"
version = "0.1.0"
description = "Math-first implementations of alternative neural network architectures, benchmarked on MNIST"
requires-python = ">=3.14"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beyond_backprop"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]
